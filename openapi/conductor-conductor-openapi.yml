        endTime:
          type: integer
          format: int64
          description: End time in epoch milliseconds
          example: 10
        updateTime:
          type: integer
          format: int64
          description: Last update time
          example: 10
        input:
          type: object
          description: Workflow input
          additionalProperties: true
          example: example_value
        output:
          type: object
          description: Workflow output
          additionalProperties: true
          example: example_value
        tasks:
