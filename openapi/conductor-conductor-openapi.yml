openapi: 3.1.0
info:
  title: Conductor API
  description: >-
    Conductor is a workflow orchestration platform originally created by Netflix.
    It allows you to build complex applications using simple and granular tasks
    that do not need to be aware of or keep track of the state of your
    application's execution flow. Conductor keeps track of the state, calls tasks
    in the right order (sequentially or in parallel, as defined by you), retries
    calls if needed, handles failure scenarios gracefully, and outputs the final
    result. This API provides endpoints for managing workflow definitions, task
    definitions, workflow executions, task executions, and event handlers.
  version: 3.x
  contact:
    name: Conductor OSS
    url: https://conductor-oss.github.io/conductor/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
externalDocs:
  description: Conductor API Documentation
  url: https://conductor-oss.github.io/conductor/documentation/api/index.html
servers:
- url: https://localhost:8080/api
  description: Local Conductor Server
- url: https://play.orkes.io/api
  description: Orkes Conductor Playground
tags:
- name: Admin
  description: Administrative and health check APIs
- name: Event
  description: APIs for managing event handlers
- name: Metadata - Task
  description: APIs for managing task definitions
- name: Metadata - Workflow
  description: APIs for managing workflow definitions
- name: Task
  description: APIs for polling and updating tasks
- name: Workflow
  description: APIs for managing workflow executions
paths:
  /metadata/workflow:
    post:
      operationId: createWorkflowDefinition
      summary: Conductor Create a New Workflow Definition
      description: Registers a new workflow definition with Conductor.
      tags:
      - Metadata - Workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WorkflowDef'
      responses:
        '200':
          description: Workflow definition created successfully
        '400':
          description: Invalid workflow definition
        '409':
          description: Workflow definition already exists
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: updateWorkflowDefinitions
      summary: Conductor Update Workflow Definitions
      description: Updates one or more existing workflow definitions.
      tags:
      - Metadata - Workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/WorkflowDef'
      responses:
        '200':
          description: Workflow definitions updated successfully
        '400':
          description: Invalid workflow definition
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: getAllWorkflowDefinitions
      summary: Conductor Get All Workflow Definitions
      description: Retrieves all registered workflow definitions.
      tags:
      - Metadata - Workflow
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WorkflowDef'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /metadata/workflow/{name}:
    get:
      operationId: getWorkflowDefinition
      summary: Conductor Get a Workflow Definition
      description: Retrieves a workflow definition by name and optionally by version.
      tags:
      - Metadata - Workflow
      parameters:
      - name: name
        in: path
        required: true
        description: The name of the workflow definition
        schema:
          type: string
      - name: version
        in: query
        required: false
        description: The version of the workflow definition
        schema:
          type: integer
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowDef'
        '404':
          description: Workflow definition not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteWorkflowDefinition
      summary: Conductor Delete a Workflow Definition
      description: Removes a workflow definition by name and version.
      tags:
      - Metadata - Workflow
      parameters:
      - name: name
        in: path
        required: true
        description: The name of the workflow definition
        schema:
          type: string
      - name: version
        in: query
        required: false
        description: The version of the workflow definition
        schema:
          type: integer
      responses:
        '204':
          description: Workflow definition deleted successfully
        '404':
          description: Workflow definition not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /metadata/taskdefs:
    post:
      operationId: createTaskDefinitions
      summary: Conductor Create New Task Definitions
      description: Registers new task definitions with Conductor.
      tags:
      - Metadata - Task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/TaskDef'
      responses:
        '200':
          description: Task definitions created successfully
        '400':
          description: Invalid task definition
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: getAllTaskDefinitions
      summary: Conductor Get All Task Definitions
      description: Retrieves all registered task definitions.
      tags:
      - Metadata - Task
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskDef'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: updateTaskDefinition
      summary: Conductor Update a Task Definition
      description: Updates an existing task definition.
      tags:
      - Metadata - Task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskDef'
      responses:
        '200':
          description: Task definition updated successfully
        '400':
          description: Invalid task definition
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /metadata/taskdefs/{taskType}:
    get:
      operationId: getTaskDefinition
      summary: Conductor Get a Task Definition
      description: Retrieves a task definition by its type name.
      tags:
      - Metadata - Task
      parameters:
      - name: taskType
        in: path
        required: true
        description: The task type name
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDef'
        '404':
          description: Task definition not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteTaskDefinition
      summary: Conductor Delete a Task Definition
      description: Removes a task definition by its type name.
      tags:
      - Metadata - Task
      parameters:
      - name: taskType
        in: path
        required: true
        description: The task type name
        schema:
          type: string
      responses:
        '204':
          description: Task definition deleted successfully
        '404':
          description: Task definition not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /workflow:
    post:
      operationId: startWorkflow
      summary: Conductor Start a New Workflow
      description: Starts a new workflow execution based on a registered workflow definition.
      tags:
      - Workflow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartWorkflowRequest'
      responses:
        '200':
          description: Workflow started successfully
          content:
            application/json:
              schema:
                type: string
                description: The workflow instance ID
        '404':
          description: Workflow definition not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /workflow/{workflowId}:
    get:
      operationId: getWorkflowExecution
      summary: Conductor Get Workflow Execution Status
      description: >-
        Retrieves the current status and details of a running or completed
        workflow execution.
      tags:
      - Workflow
      parameters:
      - name: workflowId
        in: path
        required: true
        description: The workflow instance ID
        schema:
          type: string
      - name: includeTasks
        in: query
        required: false
        description: Whether to include task details in the response
        schema:
          type: boolean
          default: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workflow'
        '404':
          description: Workflow execution not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: deleteWorkflowExecution
      summary: Conductor Delete a Workflow Execution
      description: Removes a workflow execution and its associated data.
      tags:
      - Workflow
      parameters:
      - name: workflowId
        in: path
        required: true
        description: The workflow instance ID
        schema:
          type: string
      - name: archiveWorkflow
        in: query
        required: false
        description: Whether to archive the workflow before deletion
        schema:
          type: boolean
          default: true
      responses:
        '204':
          description: Workflow execution deleted successfully
        '404':
          description: Workflow execution not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /workflow/{workflowId}/pause:
    put:
      operationId: pauseWorkflow
      summary: Conductor Pause a Running Workflow
      description: Pauses a currently running workflow execution.
      tags:
      - Workflow
      parameters:
      - name: workflowId
        in: path
        required: true
        description: The workflow instance ID
        schema:
          type: string
      responses:
        '200':
          description: Workflow paused successfully
        '404':
          description: Workflow execution not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /workflow/{workflowId}/resume:
    put:
      operationId: resumeWorkflow
      summary: Conductor Resume a Paused Workflow
      description: Resumes a previously paused workflow execution.
      tags:
      - Workflow
      parameters:
      - name: workflowId
        in: path
        required: true
        description: The workflow instance ID
        schema:
          type: string
      responses:
        '200':
          description: Workflow resumed successfully
        '404':
          description: Workflow execution not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /workflow/{workflowId}/restart:
    post:
      operationId: restartWorkflow
      summary: Conductor Restart a Completed Workflow
      description: >-
        Restarts a completed workflow from the beginning with the same input.
        If useLatestDefinitions is set, the workflow uses the latest definition.
      tags:
      - Workflow
      parameters:
      - name: workflowId
        in: path
        required: true
        description: The workflow instance ID
        schema:
          type: string
      - name: useLatestDefinitions
        in: query
        required: false
        description: Whether to use the latest workflow and task definitions
        schema:
          type: boolean
          default: false
      responses:
        '204':
          description: Workflow restarted successfully
        '404':
          description: Workflow execution not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /workflow/{workflowId}/retry:
    post:
      operationId: retryWorkflow
      summary: Conductor Retry a Failed Workflow
      description: Retries the last failed task in a workflow execution.
      tags:
      - Workflow
      parameters:
      - name: workflowId
        in: path
        required: true
        description: The workflow instance ID
        schema:
          type: string
      - name: resumeSubworkflowTasks
        in: query
        required: false
        description: Whether to resume subworkflow tasks
        schema:
          type: boolean
          default: false
      responses:
        '204':
          description: Workflow retry initiated successfully
        '404':
          description: Workflow execution not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /workflow/{workflowId}/terminate:
    delete:
      operationId: terminateWorkflow
      summary: Conductor Terminate a Running Workflow
      description: Terminates a running workflow execution with an optional reason.
      tags:
      - Workflow
      parameters:
      - name: workflowId
        in: path
        required: true
        description: The workflow instance ID
        schema:
          type: string
      - name: reason
        in: query
        required: false
        description: Reason for termination
        schema:
          type: string
      responses:
        '200':
          description: Workflow terminated successfully
        '404':
          description: Workflow execution not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /workflow/{workflowId}/skiptask/{taskReferenceName}:
    put:
      operationId: skipTaskFromWorkflow
      summary: Conductor Skip a Task in a Running Workflow
      description: >-
        Skips a given task from a running workflow and moves to the next task.
        The skipped task will be marked as completed with the provided output.
      tags:
      - Workflow
      parameters:
      - name: workflowId
        in: path
        required: true
        description: The workflow instance ID
        schema:
          type: string
      - name: taskReferenceName
        in: path
        required: true
        description: The reference name of the task to skip
        schema:
          type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SkipTaskRequest'
      responses:
        '200':
          description: Task skipped successfully
        '404':
          description: Workflow or task not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /workflow/search:
    get:
      operationId: searchWorkflows
      summary: Conductor Search for Workflow Executions
      description: >-
        Searches for workflow executions using Conductor's query language. Uses
        Elasticsearch for indexing workflow execution data.
      tags:
      - Workflow
      parameters:
      - name: start
        in: query
        required: false
        description: Start index for pagination
        schema:
          type: integer
          default: 0
      - name: size
        in: query
        required: false
        description: Number of results to return
        schema:
          type: integer
          default: 100
      - name: sort
        in: query
        required: false
        description: Sort field and order (e.g., createTime:DESC)
        schema:
          type: string
      - name: freeText
        in: query
        required: false
        description: Free text search across workflow data
        schema:
          type: string
          default: '*'
      - name: query
        in: query
        required: false
        description: Query expression for filtering results
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultWorkflowSummary'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /workflow/running/{name}:
    get:
      operationId: getRunningWorkflows
      summary: Conductor Get Running Workflow Instances
      description: >-
        Retrieves a list of running workflow instance IDs for a given workflow
        name and optionally filtered by version.
      tags:
      - Workflow
      parameters:
      - name: name
        in: path
        required: true
        description: The workflow name
        schema:
          type: string
      - name: version
        in: query
        required: false
        description: The workflow version
        schema:
          type: integer
      - name: startTime
        in: query
        required: false
        description: Start time filter (epoch milliseconds)
        schema:
          type: integer
          format: int64
      - name: endTime
        in: query
        required: false
        description: End time filter (epoch milliseconds)
        schema:
          type: integer
          format: int64
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /tasks/poll/{taskType}:
    get:
      operationId: pollForTask
      summary: Conductor Poll for a Task
      description: >-
        Polls for a task of the specified type. Used by workers to get tasks to
        execute. Returns a single task if available.
      tags:
      - Task
      parameters:
      - name: taskType
        in: path
        required: true
        description: The task type to poll for
        schema:
          type: string
      - name: workerId
        in: query
        required: false
        description: ID of the worker polling for the task
        schema:
          type: string
      - name: domain
        in: query
        required: false
        description: Domain for task routing
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '204':
          description: No tasks available for polling
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /tasks/poll/batch/{taskType}:
    get:
      operationId: batchPollForTasks
      summary: Conductor Batch Poll for Tasks
      description: >-
        Polls for multiple tasks of the specified type in a single request.
        Returns up to the specified count of tasks.
      tags:
      - Task
      parameters:
      - name: taskType
        in: path
        required: true
        description: The task type to poll for
        schema:
          type: string
      - name: workerId
        in: query
        required: false
        description: ID of the worker polling for tasks
        schema:
          type: string
      - name: count
        in: query
        required: false
        description: Number of tasks to poll for
        schema:
          type: integer
          default: 1
      - name: timeout
        in: query
        required: false
        description: Long poll timeout in milliseconds
        schema:
          type: integer
          default: 100
      - name: domain
        in: query
        required: false
        description: Domain for task routing
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /tasks:
    post:
      operationId: updateTask
      summary: Conductor Update Task Status
      description: >-
        Updates the status and result of a task. Used by workers to report task
        completion, failure, or progress.
      tags:
      - Task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskResult'
      responses:
        '200':
          description: Task updated successfully
          content:
            application/json:
              schema:
                type: string
                description: The task ID
        '400':
          description: Invalid task result
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /tasks/{taskId}:
    get:
      operationId: getTask
      summary: Conductor Get Task Details
      description: Retrieves the details of a specific task by its ID.
      tags:
      - Task
      parameters:
      - name: taskId
        in: path
        required: true
        description: The task ID
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /tasks/{taskId}/ack:
    post:
      operationId: acknowledgeTask
      summary: Conductor Acknowledge a Task
      description: >-
        Acknowledges that a task has been received by a worker. This prevents the
        task from being sent to another worker.
      tags:
      - Task
      parameters:
      - name: taskId
        in: path
        required: true
        description: The task ID to acknowledge
        schema:
          type: string
      - name: workerId
        in: query
        required: false
        description: ID of the worker acknowledging the task
        schema:
          type: string
      responses:
        '200':
          description: Task acknowledged successfully
          content:
            application/json:
              schema:
                type: boolean
        '404':
          description: Task not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /tasks/{taskId}/log:
    post:
      operationId: addTaskLog
      summary: Conductor Add a Log Entry to a Task
      description: Adds a log message to a task execution for debugging or auditing.
      tags:
      - Task
      parameters:
      - name: taskId
        in: path
        required: true
        description: The task ID
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: string
              description: The log message to add
      responses:
        '200':
          description: Log entry added successfully
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: getTaskLogs
      summary: Conductor Get Task Execution Logs
      description: Retrieves the log entries for a specific task execution.
      tags:
      - Task
      parameters:
      - name: taskId
        in: path
        required: true
        description: The task ID
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskExecLog'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /tasks/queue/sizes:
    get:
      operationId: getTaskQueueSizes
      summary: Conductor Get Task Queue Sizes
      description: >-
        Returns the number of pending tasks for each task type in the queue.
      tags:
      - Task
      parameters:
      - name: taskType
        in: query
        required: false
        description: >-
          Comma-separated list of task types. If not specified, returns sizes
          for all task types.
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: integer
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /tasks/search:
    get:
      operationId: searchTasks
      summary: Conductor Search for Tasks
      description: Searches for task executions based on query parameters.
      tags:
      - Task
      parameters:
      - name: start
        in: query
        required: false
        description: Start index for pagination
        schema:
          type: integer
          default: 0
      - name: size
        in: query
        required: false
        description: Number of results to return
        schema:
          type: integer
          default: 100
      - name: sort
        in: query
        required: false
        description: Sort field and order
        schema:
          type: string
      - name: freeText
        in: query
        required: false
        description: Free text search
        schema:
          type: string
          default: '*'
      - name: query
        in: query
        required: false
        description: Query expression for filtering results
        schema:
          type: string
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchResultTaskSummary'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /event:
    post:
      operationId: createEventHandler
      summary: Conductor Create an Event Handler
      description: >-
        Creates a new event handler definition for processing events from
        external systems.
      tags:
      - Event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventHandler'
      responses:
        '200':
          description: Event handler created successfully
        '400':
          description: Invalid event handler definition
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    put:
      operationId: updateEventHandler
      summary: Conductor Update an Event Handler
      description: Updates an existing event handler definition.
      tags:
      - Event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EventHandler'
      responses:
        '200':
          description: Event handler updated successfully
        '400':
          description: Invalid event handler definition
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: getAllEventHandlers
      summary: Conductor Get All Event Handlers
      description: Retrieves all registered event handler definitions.
      tags:
      - Event
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventHandler'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /event/{name}:
    delete:
      operationId: deleteEventHandler
      summary: Conductor Delete an Event Handler
      description: Removes an event handler by name.
      tags:
      - Event
      parameters:
      - name: name
        in: path
        required: true
        description: The event handler name
        schema:
          type: string
      responses:
        '204':
          description: Event handler deleted successfully
        '404':
          description: Event handler not found
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: getEventHandlersForEvent
      summary: Conductor Get Event Handlers for an Event
      description: Retrieves all event handlers registered for a specific event.
      tags:
      - Event
      parameters:
      - name: name
        in: path
        required: true
        description: The event name
        schema:
          type: string
      - name: activeOnly
        in: query
        required: false
        description: Whether to return only active event handlers
        schema:
          type: boolean
          default: true
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                items:
