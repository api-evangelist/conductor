components:
  schemas:
    WorkflowDef:
      type: object
      required:
      - name
      - tasks
      properties:
        name:
          type: string
          description: The name of the workflow definition
          example: Example Title
        description:
          type: string
          description: Description of the workflow
          example: A sample description.
        version:
          type: integer
          description: The version of the workflow definition
          default: 1
          example: 10
        tasks:
          type: array
          description: The list of tasks in the workflow
          items:
            $ref: '#/components/schemas/WorkflowTask'
          example: []
        inputParameters:
          type: array
          description: List of input parameter names for the workflow
          items:
            type: string
          example: []
        outputParameters:
          type: object
          description: Mapping of output parameters
          additionalProperties: true
          example: example_value
        failureWorkflow:
          type: string
          description: >-
            Name of the workflow to execute when this workflow fails
          example: example_value
        schemaVersion:
          type: integer
          description: Schema version (currently 2)
          default: 2
          example: 10
        restartable:
          type: boolean
          description: Whether the workflow is restartable
          default: true
          example: true
        workflowStatusListenerEnabled:
          type: boolean
          description: Whether to enable workflow status listener
          default: false
          example: true
        ownerEmail:
          type: string
          description: Email of the workflow definition owner
          example: user@example.com
        timeoutPolicy:
          type: string
          description: Timeout policy for the workflow
          enum:
          - TIME_OUT_WF
          - ALERT_ONLY
          example: TIME_OUT_WF
        timeoutSeconds:
          type: integer
          format: int64
          description: Timeout in seconds for the workflow
          default: 0
          example: 10
        variables:
          type: object
          description: Workflow level variables
          additionalProperties: true
          example: example_value
        inputTemplate:
          type: object
          description: Default input template
          additionalProperties: true
          example: example_value
    WorkflowTask:
      type: object
      required:
      - name
      - taskReferenceName
      - type
      properties:
        name:
          type: string
          description: Name of the task
          example: Example Title
        taskReferenceName:
          type: string
          description: Unique reference name for the task within the workflow
          example: example_value
        type:
          type: string
          description: The type of task
          enum:
          - SIMPLE
          - DYNAMIC
          - FORK_JOIN
          - FORK_JOIN_DYNAMIC
          - DECISION
          - SWITCH
          - JOIN
          - DO_WHILE
          - SUB_WORKFLOW
          - START_WORKFLOW
          - EVENT
          - WAIT
          - HUMAN
          - HTTP
          - INLINE
          - JSON_JQ_TRANSFORM
          - LAMBDA
          - SET_VARIABLE
          - TERMINATE
          - KAFKA_PUBLISH
          example: SIMPLE
        description:
          type: string
          description: Task description
          example: A sample description.
        inputParameters:
          type: object
          description: Input parameter mappings
          additionalProperties: true
          example: example_value
        optional:
          type: boolean
          description: Whether this task is optional
          default: false
          example: true
        startDelay:
          type: integer
          description: Delay in seconds before starting the task
          default: 0
          example: 10
        asyncComplete:
          type: boolean
          description: Whether the task is completed asynchronously
          default: false
          example: true
        retryCount:
          type: integer
          description: Number of retries
          example: 10
        sink:
          type: string
          description: Sink for EVENT tasks
          example: example_value
        subWorkflowParam:
          type: object
          description: Sub workflow parameters
          properties:
            name:
              type: string
            version:
              type: integer
          example: example_value
        joinOn:
          type: array
          description: List of task reference names to join on
          items:
            type: string
          example: []
        forkTasks:
          type: array
          description: List of forked task lists
          items:
            type: array
            items:
              $ref: '#/components/schemas/WorkflowTask'
          example: []
        decisionCases:
          type: object
          description: Decision cases for SWITCH/DECISION tasks
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/WorkflowTask'
          example: example_value
        defaultCase:
          type: array
          description: Default case tasks for SWITCH/DECISION
          items:
            $ref: '#/components/schemas/WorkflowTask'
          example: []
        loopCondition:
          type: string
          description: Loop condition for DO_WHILE tasks
          example: example_value
        loopOver:
          type: array
          description: Tasks to loop over in DO_WHILE
          items:
            $ref: '#/components/schemas/WorkflowTask'
          example: []
    TaskDef:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: The name of the task definition
          example: Example Title
        description:
          type: string
          description: Description of the task
          example: A sample description.
        retryCount:
          type: integer
          description: Number of retries
          default: 3
          example: 10
        retryLogic:
          type: string
          description: Retry logic
          enum:
          - FIXED
          - EXPONENTIAL_BACKOFF
          - LINEAR_BACKOFF
          example: FIXED
        retryDelaySeconds:
          type: integer
          description: Delay between retries in seconds
          default: 60
          example: 10
        timeoutSeconds:
          type: integer
          format: int64
          description: Task execution timeout in seconds
          default: 0
          example: 10
        timeoutPolicy:
          type: string
          description: Timeout policy
          enum:
          - RETRY
          - TIME_OUT_WF
          - ALERT_ONLY
          example: RETRY
        responseTimeoutSeconds:
          type: integer
          format: int64
          description: Time to wait for worker to respond after polling
          default: 3600
          example: 10
        pollTimeoutSeconds:
          type: integer
          description: Time to wait when polling for task
          example: 10
        concurrentExecLimit:
          type: integer
          description: Concurrent execution limit for the task
          example: 10
        rateLimitPerFrequency:
          type: integer
          description: Rate limit per frequency
          example: 10
        rateLimitFrequencyInSeconds:
          type: integer
          description: Rate limit frequency window in seconds
          example: 10
        ownerEmail:
          type: string
          description: Email of the task definition owner
          example: user@example.com
        inputKeys:
          type: array
          description: Expected input keys
          items:
            type: string
          example: []
        outputKeys:
          type: array
          description: Expected output keys
          items:
            type: string
          example: []
        inputTemplate:
          type: object
          description: Default input template
          additionalProperties: true
          example: example_value
        createdBy:
          type: string
          description: Creator of the task definition
          example: example_value
        createTime:
          type: integer
          format: int64
          description: Creation timestamp
          example: 10
        updatedBy:
          type: string
          description: Last updater
          example: example_value
        updateTime:
          type: integer
          format: int64
          description: Last update timestamp
          example: 10
    StartWorkflowRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          description: Name of the workflow to start
          example: Example Title
        version:
          type: integer
          description: Version of the workflow
          example: 10
        correlationId:
          type: string
          description: Correlation ID for the workflow instance
          example: '500123'
        priority:
          type: integer
          description: Priority of the workflow (0-99)
          default: 0
          example: 10
        input:
          type: object
          description: Input parameters for the workflow
          additionalProperties: true
          example: example_value
        taskToDomain:
          type: object
          description: Task to domain mapping for routing
          additionalProperties:
            type: string
          example: example_value
        workflowDef:
          $ref: '#/components/schemas/WorkflowDef'
        externalInputPayloadStoragePath:
          type: string
          description: Path to externally stored input payload
          example: example_value
    Workflow:
      type: object
      properties:
        workflowId:
          type: string
          description: Unique workflow instance ID
          example: '500123'
        workflowName:
          type: string
          description: Name of the workflow definition
          example: example_value
        workflowVersion:
          type: integer
          description: Version of the workflow definition
          example: 10
        correlationId:
          type: string
          description: Correlation ID
          example: '500123'
        status:
