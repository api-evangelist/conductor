    - path: /v1/workflow
      name: workflow
      description: REST surface for workflow.
      operations:
      - method: POST
        name: startworkflow
        description: Conductor Start a New Workflow
        call: conductor-workflow.startworkflow
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
