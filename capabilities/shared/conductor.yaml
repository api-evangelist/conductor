naftiko: "1.0.0-alpha1"

info:
  label: "Conductor API"
  description: "Conductor API for workflow orchestration, task management, and event handling."
  tags:
    - Conductor
    - Workflow Orchestration
    - Task Management
    - Automation
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      CONDUCTOR_API_TOKEN: CONDUCTOR_API_TOKEN

capability:
  consumes:
    - type: http
      namespace: conductor
      baseUri: https://play.orkes.io/api
      description: "Conductor API for workflow and task orchestration."
      authentication:
        type: bearer
        token: "{{CONDUCTOR_API_TOKEN}}"
      resources:
        - name: workflow-definitions
          path: /metadata/workflow
          description: "Workflow definition management."
          operations:
            - name: create-workflow-definition
              method: POST
              description: "Create a new workflow definition."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
            - name: get-all-workflow-definitions
              method: GET
              description: "Get all workflow definitions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-workflow-definitions
              method: PUT
              description: "Update workflow definitions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: workflow-definition-details
          path: /metadata/workflow/{name}
          description: "Individual workflow definition management."
          operations:
            - name: get-workflow-definition
              method: GET
              description: "Get a workflow definition by name."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Workflow name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-workflow-definition
              method: DELETE
              description: "Delete a workflow definition."
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "Workflow name."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: task-definitions
          path: /metadata/taskdefs
          description: "Task definition management."
          operations:
            - name: create-task-definitions
              method: POST
              description: "Create new task definitions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-all-task-definitions
              method: GET
              description: "Get all task definitions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-task-definition
              method: PUT
              description: "Update a task definition."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: task-definition-details
          path: /metadata/taskdefs/{taskType}
          description: "Individual task definition management."
          operations:
            - name: get-task-definition
              method: GET
              description: "Get a task definition."
              inputParameters:
                - name: taskType
                  in: path
                  type: string
                  required: true
                  description: "Task type."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-task-definition
              method: DELETE
              description: "Delete a task definition."
              inputParameters:
                - name: taskType
                  in: path
                  type: string
                  required: true
                  description: "Task type."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: workflow-executions
          path: /workflow
          description: "Workflow execution management."
          operations:
            - name: start-workflow
              method: POST
              description: "Start a new workflow."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
        - name: workflow-execution-details
          path: /workflow/{workflowId}
          description: "Individual workflow execution management."
          operations:
            - name: get-workflow-execution
              method: GET
              description: "Get workflow execution status."
              inputParameters:
                - name: workflowId
                  in: path
                  type: string
                  required: true
                  description: "Workflow ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-workflow-execution
              method: DELETE
              description: "Delete a workflow execution."
              inputParameters:
                - name: workflowId
                  in: path
                  type: string
                  required: true
                  description: "Workflow ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: workflow-lifecycle
          path: /workflow/{workflowId}
          description: "Workflow lifecycle operations."
          operations:
            - name: pause-workflow
              method: PUT
              description: "Pause a running workflow."
              inputParameters:
                - name: workflowId
                  in: path
                  type: string
                  required: true
                  description: "Workflow ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: resume-workflow
              method: PUT
              description: "Resume a paused workflow."
              inputParameters:
                - name: workflowId
                  in: path
                  type: string
                  required: true
                  description: "Workflow ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: terminate-workflow
              method: DELETE
              description: "Terminate a running workflow."
              inputParameters:
                - name: workflowId
                  in: path
                  type: string
                  required: true
                  description: "Workflow ID."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: workflow-search
          path: /workflow/search
          description: "Workflow search."
          operations:
            - name: search-workflows
              method: GET
              description: "Search for workflow executions."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: tasks
          path: /tasks
          description: "Task operations."
          operations:
            - name: update-task
              method: POST
              description: "Update task status."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: task-polling
          path: /tasks/poll/{taskType}
          description: "Task polling."
          operations:
            - name: poll-for-task
              method: GET
              description: "Poll for a task."
              inputParameters:
                - name: taskType
                  in: path
                  type: string
                  required: true
                  description: "Task type."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: event-handlers
          path: /event
          description: "Event handler management."
          operations:
            - name: create-event-handler
              method: POST
              description: "Create an event handler."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-all-event-handlers
              method: GET
              description: "Get all event handlers."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-event-handler
              method: PUT
              description: "Update an event handler."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
