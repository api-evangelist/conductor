        destructive: false
        idempotent: true
      call: conductor-task.searchtasks
      with:
        start: tools.start
        size: tools.size
        sort: tools.sort
        freeText: tools.freeText
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
    - name: conductor-get-task-details
      description: Conductor Get Task Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conductor-task.gettask
      with:
        taskId: tools.taskId
      outputParameters:
      - type: object
